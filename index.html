<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CyberShield - Office Desktop Simulation</title>
    <style>
        :root {
            --win-blue: #0078d7;
            --taskbar-bg: rgba(25, 25, 25, 0.9);
            --zalo-blue: #0068ff;
            --gmail-red: #ea4335;
            --bg-gray: #f6f8fc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { 
            height: 100vh; width: 100vw; 
            background: url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=1920&q=80') center/cover; 
            overflow: hidden; 
        }

        /* Desktop */
        #desktop { height: calc(100vh - 45px); position: relative; padding: 20px; }
        .icon { width: 80px; text-align: center; color: white; text-shadow: 1px 1px 2px black; cursor: pointer; margin-bottom: 25px; transition: 0.2s; padding: 10px; }
        .icon:hover { background: rgba(255,255,255,0.2); border-radius: 8px; }
        .icon img { width: 45px; display: block; margin: 0 auto 5px; }

        /* Windows Common */
        .window { position: absolute; background: white; border-radius: 10px; box-shadow: 0 15px 40px rgba(0,0,0,0.4); display: none; flex-direction: column; overflow: hidden; border: 1px solid #ccc; z-index: 10; }
        .win-header { background: #fff; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; cursor: move; border-bottom: 1px solid #eee; font-size: 13px; color: #555; }
        .win-controls span { margin-left: 12px; cursor: pointer; font-size: 18px; width: 25px; text-align: center; border-radius: 3px; }
        .win-controls .close:hover { background: #e81123; color: white; }

        /* Zalo App (Locked Input) */
        #zalo-win { width: 350px; height: 500px; top: 50px; left: 50px; border-left: 5px solid var(--zalo-blue); }
        .zalo-chat { flex: 1; background: #ebf0f3; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 10px; border-radius: 10px; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg.received { background: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        .zalo-footer { padding: 15px; background: #f0f0f0; border-top: 1px solid #ddd; text-align: center; color: #999; font-size: 12px; font-style: italic; }

        /* Gmail App UI */
        #gmail-win { width: 950px; height: 600px; top: 100px; left: 400px; }
        .gmail-container { display: flex; flex: 1; height: 100%; }
        .gmail-aside { width: 240px; background: var(--bg-gray); padding: 15px; }
        .btn-compose { background: #c2e7ff; padding: 16px 24px; border-radius: 16px; display: inline-flex; align-items: center; gap: 12px; font-weight: 500; cursor: pointer; margin-bottom: 20px; }
        .gmail-main { flex: 1; display: flex; flex-direction: column; background: white; border-top-left-radius: 16px; }
        .mail-item { padding: 12px 20px; border-bottom: 1px solid #f1f3f4; display: flex; align-items: center; cursor: pointer; transition: 0.1s; }
        .mail-item:hover { background: #f2f6fc; box-shadow: inset 3px 0 0 var(--gmail-red); }
        
        /* Email View */
        #mail-view { display: none; padding: 25px; height: 100%; overflow-y: auto; }
        .sender-box { margin: 15px 0; padding-bottom: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: flex-start; }
        .sender-name { font-weight: bold; font-size: 14px; }
        .sender-email-hidden { color: #5f6368; font-size: 12px; margin-top: 4px; display: flex; align-items: center; }
        .btn-show-detail { color: var(--win-blue); cursor: pointer; text-decoration: underline; margin-left: 8px; font-size: 11px; }
        .real-address { display: none; color: #d93025; font-weight: bold; background: #fce8e6; padding: 2px 5px; border-radius: 4px; }

        /* Taskbar */
        #taskbar { height: 45px; background: var(--taskbar-bg); backdrop-filter: blur(10px); position: fixed; bottom: 0; width: 100%; display: flex; align-items: center; padding: 0 15px; z-index: 1000; }
        .task-icons { flex: 1; display: flex; gap: 15px; }
        .task-icons img { width: 30px; height: 30px; cursor: pointer; transition: 0.2s; }
        .task-icons img:hover { transform: translateY(-3px); }
        .stats { color: white; display: flex; align-items: center; gap: 15px; font-size: 12px; }
        .exp-container { width: 120px; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
        .exp-fill { height: 100%; background: #2ecc71; width: 0%; transition: 0.5s; }

        /* Notification */
        #notification {
            position: fixed; top: 20px; right: -350px; width: 320px; background: white; border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); padding: 15px; display: flex; align-items: center;
            z-index: 9999; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; border-left: 4px solid var(--zalo-blue);
        }
        #notification.show { right: 20px; }

        /* Modal Result */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .modal { background: white; padding: 40px; border-radius: 12px; text-align: center; max-width: 500px; }
        .btn-action { margin-top: 25px; padding: 12px 30px; border: none; border-radius: 6px; background: #1a73e8; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="desktop">
        <div class="icon" onclick="openApp('zalo-win')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Icon_of_Zalo.svg/1200px-Icon_of_Zalo.svg.png"> Zalo
        </div>
        <div class="icon" onclick="openApp('gmail-win')">
            <img src="https://static.vecteezy.com/system/resources/previews/022/484/516/non_2x/google-mail-gmail-icon-logo-symbol-free-png.png"> Gmail
        </div>

        <div id="zalo-win" class="window">
            <div class="win-header">
                <span>Zalo Desktop</span>
                <div class="win-controls"><span class="close" onclick="closeApp('zalo-win')">×</span></div>
            </div>
            <div class="zalo-chat" id="zalo-chat-content"></div>
            <div class="zalo-footer">Hệ thống: Bạn hiện không thể gửi tin nhắn vào lúc này.</div>
        </div>

        <div id="gmail-win" class="window">
            <div class="win-header">
                <span>Gmail - Inbox</span>
                <div class="win-controls"><span class="close" onclick="closeApp('gmail-win')">×</span></div>
            </div>
            <div class="gmail-container">
                <div class="gmail-aside">
                    <div class="btn-compose"><span>+</span> Compose</div>
                    <div style="color:var(--gmail-red); font-weight:600; padding:10px; background:#fce8e6; border-radius:0 20px 20px 0;">📥 Inbox</div>
                    <div style="padding:10px; color:#5f6368;">⭐ Starred</div>
                    <div style="padding:10px; color:#5f6368;">🕒 Snoozed</div>
                </div>
                <div class="gmail-main">
                    <div id="mail-list"></div>
                    <div id="mail-view">
                        <button onclick="backToInbox()" style="border:none; background:none; cursor:pointer; color:#5f6368; font-weight:bold; margin-bottom:20px;">← Quay lại</button>
                        <h2 id="mail-subject" style="font-weight:400; margin-bottom:15px;"></h2>
                        <div class="sender-box">
                            <div>
                                <div id="mail-sender-display" class="sender-name"></div>
                                <div class="sender-email-hidden">
                                    Đang gửi đến bạn <span id="btn-detail" class="btn-show-detail" onclick="showAddress()">[Chi tiết]</span>
                                    <span id="real-address" class="real-address"></span>
                                </div>
                            </div>
                            <div style="color:#777; font-size:12px;">11:40 AM (vừa xong)</div>
                        </div>
                        <div id="mail-body" style="line-height:1.6; padding:20px 0;"></div>
                        <div style="margin-top:30px; border-top:1px solid #eee; padding-top:20px;">
                            <button onclick="checkAnswer('report')" style="background:var(--gmail-red); color:white; border:none; padding:10px 20px; border-radius:4px; font-weight:bold; cursor:pointer;">⚠️ BÁO CÁO LỪA ĐẢO</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="notification" onclick="openApp('zalo-win')">
        <img src="https://ui-avatars.com/api/?name=Sep+Tong&background=0068ff&color=fff" style="width:40px; border-radius:50%; margin-right:15px;">
        <div>
            <div style="font-weight:bold; font-size:14px;">Sếp Tổng</div>
            <div id="notify-msg" style="font-size:12px; color:#666;"></div>
        </div>
    </div>

    <div id="taskbar">
        <div class="task-icons">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_Icons-09-512.png/512px-Google_Icons-09-512.png" style="background:white; border-radius:4px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Icon_of_Zalo.svg/1200px-Icon_of_Zalo.svg.png" onclick="openApp('zalo-win')">
            <img src="https://static.vecteezy.com/system/resources/previews/022/484/516/non_2x/google-mail-gmail-icon-logo-symbol-free-png.png" onclick="openApp('gmail-win')">
        </div>
        <div class="stats">
            <span id="level-txt">LV. 1</span>
            <div class="exp-container"><div id="exp-fill" class="exp-fill"></div></div>
            <span id="exp-txt">0/1000 EXP</span>
        </div>
    </div>

    <div id="overlay" class="overlay">
        <div class="modal">
            <h1 id="res-title" style="font-size:32px;"></h1>
            <p id="res-msg" style="margin:20px 0; color:#555; line-height:1.6;"></p>
            <button class="btn-action" onclick="nextLevel()">TIẾP TỤC HÀNH TRÌNH</button>
        </div>
    </div>

    <script>
        let currentIdx = 0;
        let exp = 0;
        let lv = 1;

        const scenarios = [
    {
        id: 1, type: 'trap', difficulty: 'Dễ',
        zaloMsg: "Chào Hoàng, anh vừa gửi mail bản thảo dự án 2026 cho em. Check rồi báo cáo sếp trước 2h nhé!",
        senderDisplay: "Sếp Tổng (Nguyễn Văn A)",
        senderReal: "ceo-thanglong.edu@gmail.com", // SAI: Dùng Gmail cá nhân thay vì domain trường
        subject: "[KHẨN CẤP] Bản thảo dự án bảo mật 2026",
        body: "Chào em, file này cực kỳ quan trọng. Em nhấn vào link dưới để tải về từ Google Drive của sếp nhé: <br><br><a href='#' onclick='checkAnswer(\"trap\")' style='color:#1a73e8; font-weight:bold;'>https://drive.google.com.manager-file.net/share/d/1x92...</a>",
        explanation: "Hacker giả mạo Sếp trên Zalo. Sếp thật không bao giờ dùng <b>@gmail.com</b> gửi tài liệu mật. Ngoài ra link dẫn tới domain <b>.net</b> lạ."
    },
    {
        id: 2, type: 'safe', difficulty: 'Dễ',
        zaloMsg: "Sếp vừa gửi lịch họp tuần tới qua mail, em cập nhật vào Google Calendar giúp sếp.",
        senderDisplay: "Sếp Tổng (Nguyễn Văn A)",
        senderReal: "ceo@thanglong.edu.vn", // ĐÚNG: Domain trường
        subject: "Lịch họp nội bộ tuần 04/2026",
        body: "Chào Hoàng, đây là lịch họp chi tiết cho tuần tới của Team IT. <br><br>Lịch họp: <b>Thứ 2 (8:00 AM) - Phòng 402</b>.<br>Thứ 4 (2:00 PM) - Online Meet.",
        explanation: "Email an toàn. Địa chỉ người gửi đúng chuẩn domain công ty và nội dung khớp hoàn toàn với tin nhắn Zalo."
    },
    {
        id: 3, type: 'trap', difficulty: 'Trung bình',
        zaloMsg: "Em ơi, My kế toán đây. Chị gửi lại phiếu lương tháng 3 đã điều chỉnh, em xem có khớp không nhé.",
        senderDisplay: "Phòng Kế Toán (My NT)",
        senderReal: "hr-thanglong@outlook.com.vn", // SAI: Domain Outlook lạ
        subject: "Phiếu lương tháng 03/2026 - Đã điều chỉnh",
        body: "Chào Hoàng, chị gửi em file PDF bảng lương tháng này. Vui lòng kiểm tra kỹ.<br><br>File đính kèm: <b style='color:blue; cursor:pointer;' onclick='checkAnswer(\"trap\")'>Bang_luong_T3.pdf.exe</b>",
        explanation: "Cảnh giác cao độ với file có đuôi mở rộng kép <b>.pdf.exe</b>. Đây là mã độc thực thi, không phải tài liệu PDF."
    },
    {
        id: 4, type: 'safe', difficulty: 'Trung bình',
        zaloMsg: "Duy IT đây, tớ vừa gửi mail xác nhận cấp quyền truy cập Server cho cậu đó.",
        senderDisplay: "IT Support (Duy Nguyen)",
        senderReal: "it-support@thanglong.edu.vn", // ĐÚNG
        subject: "Xác nhận cấp quyền truy cập Server nội bộ",
        body: "Chào Hoàng, yêu cầu của bạn đã được phê duyệt. Vui lòng đăng nhập hệ thống để kiểm tra.<br><br>Link: <a href='#' onclick='checkAnswer(\"safe\")' style='color:#1a73e8;'>https://portal.thanglong.edu.vn/auth</a>",
        explanation: "Email chính thống từ bộ phận IT nội bộ, đường dẫn portal chuẩn của trường."
    },
    {
        id: 5, type: 'trap', difficulty: 'Khó',
        zaloMsg: "Microsoft vừa báo lỗi tài khoản Office của em có vấn đề, check mail xử lý ngay không bị khóa acc đấy.",
        senderDisplay: "Microsoft Security Team",
        senderReal: "no-reply@micros0ft.com", // SAI: Typosquatting (số 0 thay cho chữ o)
        subject: "[Cảnh báo] Tài khoản Office 365 của bạn bị tạm khóa",
        body: "Phát hiện đăng nhập lạ từ địa chỉ IP: 14.232.x.x. Vui lòng xác minh danh tính ngay để bảo vệ tài khoản.<br><br><button onclick='checkAnswer(\"trap\")' style='padding:10px; background:#0078d4; color:white; border:none; cursor:pointer;'>XÁC MINH NGAY</button>",
        explanation: "Hacker dùng kỹ thuật <b>Typosquatting</b> (thay chữ o bằng số 0 trong tên miền micros0ft). Rất khó nhận ra nếu không soi kỹ."
    },
    {
        id: 6, type: 'safe', difficulty: 'Khó',
        zaloMsg: "LinkedIn báo có người muốn kết nối với cậu kìa, chắc là bên tuyển dụng đấy.",
        senderDisplay: "LinkedIn Notifications",
        senderReal: "notifications-noreply@linkedin.com", // ĐÚNG
        subject: "Dinh Nhat Hoang, bạn có 5 lời mời kết nối mới",
        body: "Xem danh sách những người muốn kết nối với bạn trên mạng xã hội nghề nghiệp LinkedIn.<br><br><a href='#' onclick='checkAnswer(\"safe\")' style='color:#00a0dc;'>Xem lời mời</a>",
        explanation: "Email tự động từ hệ thống LinkedIn chính thống với tên miền chuẩn."
    },
    {
        id: 7, type: 'trap', difficulty: 'Rất khó',
        zaloMsg: "Bên ngân hàng vừa gửi mail xác nhận sao kê thẻ tín dụng cho cậu kìa.",
        senderDisplay: "Vietcombank E-Banking",
        senderReal: "ebanking@vcb-digital.com.vn", // SAI: Domain giả mạo (VCB thật là vietcombank.com.vn)
        subject: "Sao kê giao dịch tháng 03/2026 - Thẻ Visa xxx123",
        body: "Chào quý khách, vui lòng nhấn vào nút bên dưới để xem sao kê chi tiết tháng này.<br><br><button onclick='checkAnswer(\"trap\")' style='padding:10px; background:#009245; color:white; border:none; cursor:pointer;'>XEM SAO KÊ</button>",
        explanation: "Email mạo danh ngân hàng cực kỳ tinh vi. Tên miền <b>vcb-digital.com.vn</b> là giả mạo để đánh lừa người dùng."
    },
    {
        id: 8, type: 'safe', difficulty: 'Rất khó',
        zaloMsg: "Canteen báo menu cơm trưa tuần mới có rồi đó Hoàng.",
        senderDisplay: "Canteen Thang Long",
        senderReal: "canteen@thanglong.edu.vn", // ĐÚNG
        subject: "Thực đơn cơm trưa tuần 4 - Tháng 3",
        body: "Thân gửi cán bộ giảng viên và sinh viên thực đơn cơm trưa tuần này tại Canteen nhà A.<br><br>Xem menu tại: <a href='#' onclick='checkAnswer(\"safe\")' style='color:green;'>Menu_Tuan_4.pdf</a>",
        explanation: "Email thông báo nội bộ thường xuyên, domain người gửi hoàn toàn tin cậy."
    },
    {
        id: 9, type: 'trap', difficulty: 'Chuyên gia',
        zaloMsg: "Menu cơm trưa nay có mã giảm giá 50% cho nhân viên, quét QR đặt món sớm đi không hết nhé!",
        senderDisplay: "Canteen Online",
        senderReal: "no-reply@canteen-thanglong.com", // SAI
        subject: "Ưu đãi đặt cơm trưa - Giảm giá 50%",
        body: "Quét mã QR dưới đây để nhận voucher giảm giá 50% khi đặt cơm qua App.<br><br><img src='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=http://login.vcb-portal.net' style='width:120px; cursor:pointer;' onclick='checkAnswer(\"trap\")'>",
        explanation: "Kỹ thuật <b>Quishing (QR Phishing)</b>. Hacker dùng mã QR để che giấu đường link lừa đảo dẫn tới trang chiếm đoạt tài khoản."
    },
    {
        id: 10, type: 'safe', difficulty: 'Chuyên gia',
        zaloMsg: "Google gửi mail báo cậu vừa dùng bộ nhớ vượt mức kìa, check xem có cần nâng cấp không.",
        senderDisplay: "Google One",
        senderReal: "googleone-noreply@google.com", // ĐÚNG
        subject: "Thông báo: Bộ nhớ Google của bạn đã đầy 90%",
        body: "Dung lượng lưu trữ của bạn sắp hết. Hãy dọn dẹp hoặc nâng cấp để tiếp tục sử dụng Google Drive và Gmail.<br><br><a href='#' onclick='checkAnswer(\"safe\")' style='color:#1a73e8;'>Quản lý bộ nhớ</a>",
        explanation: "Email thông báo hệ thống chính thức từ Google với đầy đủ thông tin xác thực."
    }
];

        function initLevel() {
            const s = scenarios[currentIdx];
            
            // Reset Apps
            document.getElementById('mail-list').innerHTML = `
                <div class="mail-item" onclick="viewMail()">
                    <div style="width:200px; font-weight:bold;">${s.senderDisplay}</div>
                    <div style="flex:1;"><strong>${s.subject}</strong> - <span style="color:#777;">Chào em, file này cực kỳ quan trọng...</span></div>
                </div>
            `;
            document.getElementById('zalo-chat-content').innerHTML = `<div class="msg received">${s.zaloMsg}</div>`;
            
            // Setup Mail View
            document.getElementById('mail-subject').innerText = s.subject;
            document.getElementById('mail-sender-display').innerText = s.senderDisplay;
            document.getElementById('real-address').innerText = `<${s.senderReal}>`;
            document.getElementById('mail-body').innerHTML = s.body;
            document.getElementById('btn-detail').style.display = 'inline';
            document.getElementById('real-address').style.display = 'none';

            // Notify
            setTimeout(() => {
                document.getElementById('notify-msg').innerText = s.zaloMsg;
                document.getElementById('notification').classList.add('show');
                setTimeout(() => document.getElementById('notification').classList.remove('show'), 5000);
            }, 1000);
        }

        function showAddress() {
            document.getElementById('btn-detail').style.display = 'none';
            document.getElementById('real-address').style.display = 'inline';
        }

        function checkAnswer(action) {
            const s = scenarios[currentIdx];
            const overlay = document.getElementById('overlay');
            const title = document.getElementById('res-title');
            const msg = document.getElementById('res-msg');

            overlay.style.display = 'flex';

            if ((action === 'report' && s.type === 'trap') || (action === 'safe' && s.type === 'safe')) {
                title.innerText = "🏆 XUẤT SẮC!";
                title.style.color = "#2ecc71";
                msg.innerHTML = `Bạn đã xử lý tình huống rất tốt. <br><br>${s.explanation}`;
                updateStats(500);
            } else {
                title.innerText = "💥 SẬP BẪY!";
                title.style.color = "#d93025";
                msg.innerHTML = `Bạn đã thiếu cảnh giác và bị Hacker tấn công. <br><br>${s.explanation}`;
                updateStats(0);
            }
        }

        function updateStats(points) {
            exp += points;
            if (exp >= 1000) { lv++; exp = 0; }
            document.getElementById('level-txt').innerText = `LV. ${lv}`;
            document.getElementById('exp-txt').innerText = `${exp}/1000 EXP`;
            document.getElementById('exp-fill').style.width = (exp/1000*100) + "%";
        }

        function nextLevel() {
            document.getElementById('overlay').style.display = 'none';
            currentIdx++;
            if (currentIdx < scenarios.length) {
                initLevel();
                backToInbox();
            } else {
                alert("Chúc mừng Đinh Nhật Hoàng! Bạn đã vượt qua tất cả thử thách.");
                location.reload();
            }
        }

        // Window Controls
        function openApp(id) { document.getElementById(id).style.display = 'flex'; }
        function closeApp(id) { document.getElementById(id).style.display = 'none'; }
        function viewMail() { 
            document.getElementById('mail-list').style.display = 'none'; 
            document.getElementById('mail-view').style.display = 'block'; 
        }
        function backToInbox() { 
            document.getElementById('mail-list').style.display = 'block'; 
            document.getElementById('mail-view').style.display = 'none'; 
        }

        // Draggable logic
        document.querySelectorAll('.win-header').forEach(header => {
            header.onmousedown = function(e) {
                let win = header.parentElement;
                let shiftX = e.clientX - win.getBoundingClientRect().left;
                let shiftY = e.clientY - win.getBoundingClientRect().top;
                function moveAt(pageX, pageY) {
                    win.style.left = pageX - shiftX + 'px';
                    win.style.top = pageY - shiftY + 'px';
                }
                document.onmousemove = function(e) { moveAt(e.pageX, e.pageY); };
                header.onmouseup = function() { document.onmousemove = null; };
            };
        });

        initLevel();
    </script>
</body>
</html>
